syntax = "proto3";

package workers;

option go_package = "./workers";

message JoinRequest {
  string          api_key   = 1;
  string          signature = 2;
  optional string token     = 3;
  optional WorkerMetadata metadata = 4;
}

message WorkerMetadata {
  optional string name = 1;
  optional string os = 2;
}

message JoinResponse {
  string worker_id    = 1;
  string worker_token = 2;
}

message AliveRequest {
  string worker_token = 1;
}

message AliveResponse {
  bool   alive        = 1;
  string last_seen_at = 2;
  string worker_id    = 3;
}

message GetManifestRequest {}

message GetManifestResponse {
  repeated string init_commands = 1;
}

message StorageRequest {
  string path = 1;
}

message StorageResponse {
  bytes chunk  = 1;
  int32 offset = 2;
  bool  eof    = 3;
}

message NetworkInterfaceMessage {
  string interface_name = 1;
  string ip_address     = 2;
  string cidr           = 3;
  string gateway_ip     = 4;
  string gateway_mac    = 5;
}

message ConnectInternalNetworkRequest {
  string worker_id           = 1;
  string network_id          = 2;
  repeated NetworkInterfaceMessage network_interfaces = 3;
}

message ConnectInternalNetworkResponse {
  string message = 1;
}

message BuiltinToolRegistryRequest {
  string os = 1;    // worker sends: runtime.GOOS (e.g., "linux")
  string arch = 2;  // worker sends: runtime.GOARCH (e.g., "arm64")
}

message BuiltinToolRegistryResponse {
  repeated string tool_paths = 1;
}

message RemoteExecuteSubscribeRequest {}

enum RemoteExecuteSubscribeEventType {
  REMOTE_EXECUTE_SUBSCRIBE_EVENT_UNKNOWN   = 0;
  REMOTE_EXECUTE_SUBSCRIBE_EVENT_CONNECTED = 1;
  REMOTE_EXECUTE_SUBSCRIBE_EVENT_COMMAND   = 2;
}

message RemoteExecuteSubscribeResponse {
  string id                               = 1;
  string worker_id                        = 2;
  RemoteExecuteSubscribeEventType type    = 3;
  string session_id                       = 4;
  string command                          = 5;
}

message RemoteExecuteResultStream {
  string id                            = 1;
  string session_id                    = 2;
  RemoteExecuteResultEventType type    = 3;
  bytes  data                          = 4;
  int32  exit_code                     = 5;
}

enum RemoteExecuteResultEventType {
  REMOTE_EXECUTE_RESULT_UNKNOWN = 0;
  REMOTE_EXECUTE_RESULT_STDOUT  = 1;
  REMOTE_EXECUTE_RESULT_STDERR  = 2;
  REMOTE_EXECUTE_RESULT_EXIT    = 3;
  REMOTE_EXECUTE_RESULT_ERROR   = 4;
}

message RemoteExecuteResultAck {
  bool   success = 1;
  string message = 2;
}

service WorkersService {
  rpc Join(JoinRequest) returns (JoinResponse);
  rpc Alive(AliveRequest) returns (stream AliveResponse);
  rpc GetManifest(GetManifestRequest) returns (GetManifestResponse);
  rpc Storage(StorageRequest) returns (stream StorageResponse);
  rpc ConnectInternalNetwork(ConnectInternalNetworkRequest) returns (ConnectInternalNetworkResponse);
  rpc BuiltinToolRegistry(BuiltinToolRegistryRequest) returns (BuiltinToolRegistryResponse);
  rpc RemoteExecuteSubscribe(RemoteExecuteSubscribeRequest) returns (stream RemoteExecuteSubscribeResponse);
  rpc RemoteExecuteResult(RemoteExecuteResultStream) returns (RemoteExecuteResultAck);
}
