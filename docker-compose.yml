services:
  console:
    container_name: console
    image: oasm/oasm-console:latest
    build:
      context: ./console
      dockerfile: Dockerfile
    networks:
      - oasm
    env_file:
      - ./console/.env
    ports:
      - '3000:80'
    restart: 'always'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

    depends_on:
      core-api:
        condition: service_healthy

  core-api:
    container_name: oasm-api
    image: oasm/oasm-api:latest
    build:
      context: ./core-api
      dockerfile: Dockerfile
    networks:
      - oasm
    env_file:
      - ./core-api/.env
    ports:
      - '6276:6276'
      - '16276:16276'
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://:password@redis:6379/0
      - GEO_IP_URL=geo-ip:4360
      - OASM_CLOUD_APIKEY=change_me
      - RUSTFS_ENDPOINT=http://rustfs:9000
    restart: 'always'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    depends_on:
      migration:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_started
    volumes:
      - ./.open-api:/.open-api
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:6276/api/health']
      interval: 1s
      timeout: 30s
      retries: 10

  oasm-worker:
    image: oasm/oasm-worker:latest
    build:
      context: ./worker
      dockerfile: Dockerfile
    env_file:
      - ./worker/.env
    environment:
      - WORKER_API_KEY=change_me
      - WORKER_GRPC_HOST=core-api
      - WORKER_GRPC_PORT=16276
      - WORKER_MAX_CONCURRENCY=10
      - WORKER_TOOL_PATH=/app/oasm-tools
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    volumes:
      - worker-tools-cache:/app/oasm-tools:rw
    networks:
      - oasm
    restart: 'always'
    depends_on:
      core-api:
        condition: service_healthy

  postgres:
    container_name: oasm-postgres
    image: pgvector/pgvector:pg17
    restart: always
    env_file:
      - ./core-api/.env
    environment:
      POSTGRES_USER: '${POSTGRES_USERNAME:-postgres}'
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-open_asm}
      POSTGRES_HOST_AUTH_METHOD: trust
      PGUSER: '${POSTGRES_USERNAME:-postgres}'
      PGPASSWORD: '${POSTGRES_PASSWORD:-postgres}'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    volumes:
      - pgdata:/var/lib/postgresql/data:rw
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    networks:
      - oasm
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER:-postgres}" -d "$${POSTGRES_DB:-open_asm}"']
      interval: 1s
      timeout: 5s
      retries: 10

  redis:
    container_name: oasm-redis
    image: redis:alpine
    restart: always
    ports:
      - '6379:6379'
    networks:
      - oasm
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    volumes:
      - redis-data:/data
    command: 'redis-server --requirepass password'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'password', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1500M
        reservations:
          cpus: '0.5'
          memory: 512M

  geo-ip:
    container_name: geo-ip
    image: ghcr.io/l1ttps/geoip-proxy:latest
    networks:
      - oasm
    ports:
      - '4360:4360'
    restart: 'always'
    volumes:
      - geoip-data:/app/data:rw

  rustfs:
    container_name: oasm-rustfs
    image: rustfs/rustfs:latest
    networks:
      - oasm
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      - RUSTFS_ACCESS_KEY=rustfsadmin
      - RUSTFS_SECRET_KEY=rustfssecret
    volumes:
      - rustfs-data:/data:rw
    restart: 'always'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    command: ['/data']

  migration:
    container_name: oasm-migration
    image: oasm/oasm-api:latest
    networks:
      - oasm
    env_file:
      - ./core-api/.env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USERNAME=${POSTGRES_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-open_asm}
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "node node_modules/typeorm/cli.js migration:run -d dist/database/database-config.js"

volumes:
  pgdata:
  redis-data:
  redpanda-data:
  geoip-data:
  rustfs-data:
  worker-tools-cache:

networks:
  oasm:
    driver: bridge
