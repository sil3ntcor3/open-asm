name: Build myoasm Images

on:
  push:
    branches:
      - "main"
    paths:
      - "console/**"
      - "core-api/**"
      - "worker/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            console:
              - 'console/**'
            api:
              - 'core-api/**'
            worker:
              - 'worker/**'
      - id: set-matrix
        run: |
          CHANGED=()
          if [ "${{ steps.filter.outputs.console }}" == "true" ]; then CHANGED+=('{"image":"sil3ntcor3/myoasm-console:latest","context":"console"}'); fi
          if [ "${{ steps.filter.outputs.api }}" == "true" ]; then CHANGED+=('{"image":"sil3ntcor3/myoasm-api:latest","context":"core-api"}'); fi
          if [ "${{ steps.filter.outputs.worker }}" == "true" ]; then CHANGED+=('{"image":"sil3ntcor3/myoasm-worker:latest","context":"worker"}'); fi

          if [ ${#CHANGED[@]} -eq 0 ]; then
            MATRIX='{"include":[]}'
          else
            MATRIX="{\"include\":[$(IFS=,; echo "${CHANGED[*]}")]}"
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build:
    name: Build & Push (${{ matrix.context }})
    needs: detect-changes
    runs-on: ubuntu-latest
    if: ${{ needs.detect-changes.outputs.matrix != '{"include":[]}' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 -t "${{ matrix.image }}" --push ${{ matrix.context }}/
