name: Build myoasm Images

on:
  push:
    branches:
      - "main"
    paths:
      - "console/**"
      - "core-api/**"
      - "worker/**"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to build manually"
        type: choice
        default: all
        options:
          - all
          - console
          - core-api
          - worker

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            console:
              - 'console/**'
            api:
              - 'core-api/**'
            worker:
              - 'worker/**'
      - id: set-matrix
        env:
          DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
          SVC: ${{ github.event.inputs.service }}
        run: |
          add_console=false; add_api=false; add_worker=false

          if [ "$DISPATCH" == "true" ]; then
            case "$SVC" in
              all)      add_console=true; add_api=true; add_worker=true ;;
              console)  add_console=true ;;
              core-api) add_api=true ;;
              worker)   add_worker=true ;;
            esac
          else
            [ "${{ steps.filter.outputs.console }}" == "true" ] && add_console=true
            [ "${{ steps.filter.outputs.api }}" == "true" ] && add_api=true
            [ "${{ steps.filter.outputs.worker }}" == "true" ] && add_worker=true
          fi

          CHANGED=()
          $add_console && CHANGED+=('{"image":"sil3ntcor3/myoasm-console:latest","context":"console"}')
          $add_api && CHANGED+=('{"image":"sil3ntcor3/myoasm-api:latest","context":"core-api"}')
          $add_worker && CHANGED+=('{"image":"sil3ntcor3/myoasm-worker:latest","context":"worker"}')

          if [ ${#CHANGED[@]} -eq 0 ]; then
            MATRIX='{"include":[]}'
          else
            MATRIX="{\"include\":[$(IFS=,; echo "${CHANGED[*]}")]}"
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build:
    name: Build & Push (${{ matrix.context }})
    needs: detect-changes
    runs-on: ubuntu-latest
    if: ${{ needs.detect-changes.outputs.matrix != '{"include":[]}' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 -t "${{ matrix.image }}" --push ${{ matrix.context }}/
